<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ombre Brain · 记忆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F4FC;
  --bg-warm: #FBF9FF;
  --card: #FFFFFF;
  --card-hover: #FDFCFF;
  --primary: #9B8EC4;
  --primary-soft: #C6BBDF;
  --primary-deep: #6E5BA0;
  --primary-glass: rgba(155, 142, 196, 0.08);
  --accent: #D4A8E0;
  --accent-warm: #E8C4D8;
  --text: #3A3150;
  --text-secondary: #7E7694;
  --text-muted: #B0A8C0;
  --border: #EDE8F5;
  --border-soft: #F0ECF7;
  --shadow-sm: 0 1px 3px rgba(62,48,96,0.04);
  --shadow-md: 0 4px 16px rgba(62,48,96,0.06);
  --shadow-lg: 0 8px 32px rgba(62,48,96,0.08);
  --shadow-glow: 0 0 20px rgba(155,142,196,0.15);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
  --font-body: 'DM Sans', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --feel-color: #D4A8E0;
  --pinned-color: #E8C47E;
  --high-imp-color: #C47E8B;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── Header ─── */
.header {
  background: linear-gradient(135deg, var(--bg-warm) 0%, #F0EAF8 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px 0 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.logo {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  color: var(--primary-deep);
  letter-spacing: 0.02em;
}

.logo span {
  font-weight: 400;
  font-style: italic;
  color: var(--primary);
  margin-left: 4px;
}

.stats-bar {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-secondary);
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 5px;
}

.stat-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--primary-soft);
}

.stat-dot.live { background: #7EC8A0; }
.stat-dot.feel { background: var(--feel-color); }

/* ─── Tabs ─── */
.tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding-bottom: 2px;
}

.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: var(--transition);
  user-select: none;
}

.tab:hover {
  background: var(--primary-glass);
  color: var(--text);
}

.tab.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(155,142,196,0.3);
}

/* ─── Search ─── */
.search-wrap {
  max-width: 1100px;
  margin: 20px auto 0;
  padding: 0 24px;
}

.search-box {
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 12px 20px 12px 44px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  background: var(--card);
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text);
  outline: none;
  transition: var(--transition);
}

.search-box input::placeholder { color: var(--text-muted); }

.search-box input:focus {
  border-color: var(--primary-soft);
  box-shadow: var(--shadow-glow);
}

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 16px;
}

/* ─── Main Layout ─── */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 24px;
  align-items: start;
}

/* ─── Calendar Heatmap ─── */
.sidebar { position: sticky; top: 100px; }

.calendar-card {
  background: var(--card);
  border-radius: var(--radius-lg);
  padding: 20px;
  border: 1px solid var(--border-soft);
  box-shadow: var(--shadow-sm);
}

.calendar-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--primary-deep);
  margin-bottom: 4px;
}

.calendar-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.calendar-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.calendar-nav button {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 18px;
  padding: 4px 8px;
  border-radius: 8px;
  transition: var(--transition);
}

.calendar-nav button:hover {
  background: var(--primary-glass);
  color: var(--primary-deep);
}

.calendar-month {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.calendar-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin-bottom: 4px;
}

.calendar-weekday {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  padding: 4px 0;
  font-weight: 500;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.calendar-day {
  aspect-ratio: 1;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-secondary);
  cursor: default;
  transition: var(--transition);
  position: relative;
}

.calendar-day.empty { visibility: hidden; }

.calendar-day.has-memories { cursor: pointer; }
.calendar-day.has-memories:hover { transform: scale(1.15); }

.calendar-day.level-0 { background: var(--bg); }
.calendar-day.level-1 { background: #E8E0F4; color: var(--primary-deep); }
.calendar-day.level-2 { background: #D4C8E8; color: var(--primary-deep); }
.calendar-day.level-3 { background: #BFA8DC; color: white; }
.calendar-day.level-4 { background: #9B8EC4; color: white; }
.calendar-day.level-5 { background: #7B68AE; color: white; }

.calendar-day.today {
  outline: 2px solid var(--primary);
  outline-offset: 1px;
}

.calendar-legend {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  margin-top: 12px;
  font-size: 11px;
  color: var(--text-muted);
}

.legend-block {
  width: 12px;
  height: 12px;
  border-radius: 3px;
}

/* ─── Quick Stats in Sidebar ─── */
.quick-stats {
  background: var(--card);
  border-radius: var(--radius-lg);
  padding: 20px;
  border: 1px solid var(--border-soft);
  box-shadow: var(--shadow-sm);
  margin-top: 16px;
}

.quick-stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  font-size: 13px;
}

.quick-stat-row:not(:last-child) {
  border-bottom: 1px solid var(--border-soft);
}

.quick-stat-label { color: var(--text-secondary); }

.quick-stat-value {
  font-weight: 600;
  color: var(--text);
}

/* ─── Memory Groups ─── */
.memory-feed { min-width: 0; }

.date-group { margin-bottom: 24px; }

.date-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  cursor: pointer;
  user-select: none;
  position: sticky;
  top: 88px;
  z-index: 10;
  background: var(--bg);
}

.date-header::before {
  content: '';
  position: absolute;
  inset: -4px -12px;
  background: var(--bg);
  z-index: -1;
  border-radius: 8px;
}

.date-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--primary-soft);
  flex-shrink: 0;
  transition: var(--transition);
}

.date-group.today .date-dot {
  background: var(--primary);
  box-shadow: 0 0 8px rgba(155,142,196,0.4);
}

.date-label {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
}

.date-count {
  font-size: 12px;
  color: var(--text-muted);
  margin-left: auto;
}

.date-chevron {
  color: var(--text-muted);
  font-size: 14px;
  transition: transform var(--transition);
}

.date-group.collapsed .date-chevron {
  transform: rotate(-90deg);
}

.date-group.collapsed .memory-list {
  display: none;
}

.memory-list {
  padding-left: 22px;
  border-left: 2px solid var(--border-soft);
  margin-left: 4px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-top: 8px;
}

/* ─── Memory Cards ─── */
.memory-card {
  background: var(--card);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  border: 1px solid var(--border-soft);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.memory-card:hover {
  border-color: var(--primary-soft);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.memory-card.pinned {
  border-left: 3px solid var(--pinned-color);
}

.memory-card.feel {
  border-left: 3px solid var(--feel-color);
}

.memory-card.high-imp {
  border-left: 3px solid var(--high-imp-color);
}

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}

.card-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}

.card-badges {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.badge {
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  line-height: 1.4;
}

.badge.pinned-badge {
  background: rgba(232,196,126,0.15);
  color: #B8940E;
}

.badge.feel-badge {
  background: rgba(212,168,224,0.15);
  color: #9B5AAE;
}

.badge.imp-badge {
  background: rgba(196,126,139,0.15);
  color: #A05060;
}

.card-content {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 10px;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.card-domain {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 8px;
  background: var(--primary-glass);
  color: var(--primary-deep);
  font-weight: 500;
}

.card-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  flex: 1;
}

.card-tag {
  font-size: 11px;
  color: var(--text-muted);
}

.card-imp {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: auto;
  white-space: nowrap;
}

/* ─── Detail Modal ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(42,32,68,0.4);
  backdrop-filter: blur(8px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}

.modal-overlay.open { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal {
  background: var(--card);
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 560px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.25s ease;
}

.modal-header {
  padding: 24px 24px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.modal-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.modal-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: var(--transition);
}

.modal-close:hover {
  background: var(--primary-glass);
  color: var(--text);
}

.modal-body { padding: 20px 24px; }

.modal-section {
  margin-bottom: 20px;
}

.modal-section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

.modal-content-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.8;
  white-space: pre-wrap;
}

.modal-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.meta-item {
  background: var(--bg);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
}

.meta-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 2px;
}

.meta-value {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.modal-tags-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.modal-tag {
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  background: var(--primary-glass);
  color: var(--primary-deep);
  font-weight: 500;
}

/* Importance bar */
.imp-bar-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.imp-bar-track {
  flex: 1;
  height: 6px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
}

.imp-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--primary-soft), var(--primary));
  transition: width 0.4s ease;
}

.imp-bar-num {
  font-size: 14px;
  font-weight: 600;
  color: var(--primary-deep);
  min-width: 24px;
  text-align: right;
}

/* ─── Edit Modal ─── */
.edit-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }

.edit-field { margin-bottom: 14px; }

.edit-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  display: block;
}

.edit-input, .edit-textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text);
  background: var(--bg-warm);
  outline: none;
  transition: var(--transition);
}

.edit-input:focus, .edit-textarea:focus {
  border-color: var(--primary-soft);
  box-shadow: 0 0 0 3px rgba(155,142,196,0.1);
}

.edit-textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}

.modal-actions {
  padding: 16px 24px 24px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.btn {
  padding: 9px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: var(--transition);
  border: none;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-primary:hover {
  background: var(--primary-deep);
  box-shadow: 0 2px 8px rgba(155,142,196,0.3);
}

.btn-secondary {
  background: var(--bg);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--primary-glass);
  color: var(--text);
}

.btn-danger {
  background: rgba(196,126,139,0.1);
  color: var(--high-imp-color);
}

.btn-danger:hover {
  background: rgba(196,126,139,0.2);
}

/* ─── Loading & Empty ─── */
.loading-wrap {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.loading-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty-text {
  font-size: 14px;
}

/* ─── Toast ─── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: white;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  z-index: 2000;
  transition: transform 0.3s ease;
  pointer-events: none;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ─── Responsive ─── */
@media (max-width: 840px) {
  .main {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
    order: -1;
  }

  .calendar-card { margin-bottom: 0; }

  .header-top { flex-direction: column; align-items: flex-start; gap: 8px; }

  .modal {
    max-width: 100%;
    max-height: 90vh;
    border-radius: var(--radius-lg);
  }

  .modal-meta-grid { grid-template-columns: 1fr; }

  .date-header { top: 80px; }
}

@media (max-width: 480px) {
  .header { padding: 16px 0 14px; }
  .header-inner { padding: 0 16px; }
  .search-wrap { padding: 0 16px; }
  .main { padding: 16px; }
  .logo { font-size: 24px; }
  .tabs { gap: 4px; }
  .tab { padding: 6px 12px; font-size: 12px; }
  .memory-card { padding: 14px 16px; }
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary-soft); }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">Ombre<span>Brain</span></div>
      <div class="stats-bar">
        <div class="stat-item"><div class="stat-dot live"></div><span id="stat-total">0</span> 条记忆</div>
        <div class="stat-item"><div class="stat-dot feel"></div><span id="stat-feel">0</span> 条 feel</div>
        <div class="stat-item"><div class="stat-dot"></div><span id="stat-pinned">0</span> 条钉选</div>
      </div>
    </div>
    <div class="tabs" id="tabs">
      <div class="tab active" data-filter="all">全部</div>
      <div class="tab" data-filter="pinned">📌 钉选</div>
      <div class="tab" data-filter="feel">💜 Feel</div>
      <div class="tab" data-filter="recent">近 7 天</div>
      <div class="tab" data-filter="important">⭐ 高重要度</div>
      <div class="tab" data-filter="resolved">已沉底</div>
    </div>
  </div>
</header>

<!-- Search -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="搜索记忆...">
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="memory-feed" id="memory-feed">
    <div class="loading-wrap" id="loading">
      <div class="loading-spinner"></div>
      <div>正在唤醒记忆...</div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="calendar-card">
      <div class="calendar-title">记忆密度</div>
      <div class="calendar-subtitle">颜色越深，当天记忆越多</div>
      <div class="calendar-nav">
        <button id="cal-prev">◀</button>
        <span class="calendar-month" id="cal-month"></span>
        <button id="cal-next">▶</button>
      </div>
      <div class="calendar-weekdays">
        <div class="calendar-weekday">日</div>
        <div class="calendar-weekday">一</div>
        <div class="calendar-weekday">二</div>
        <div class="calendar-weekday">三</div>
        <div class="calendar-weekday">四</div>
        <div class="calendar-weekday">五</div>
        <div class="calendar-weekday">六</div>
      </div>
      <div class="calendar-grid" id="cal-grid"></div>
      <div class="calendar-legend">
        少 <div class="legend-block level-0" style="background:var(--bg)"></div>
        <div class="legend-block" style="background:#E8E0F4"></div>
        <div class="legend-block" style="background:#D4C8E8"></div>
        <div class="legend-block" style="background:#BFA8DC"></div>
        <div class="legend-block" style="background:#9B8EC4"></div>
        <div class="legend-block" style="background:#7B68AE"></div> 多
      </div>
    </div>

    <div class="quick-stats">
      <div class="quick-stat-row">
        <span class="quick-stat-label">最活跃领域</span>
        <span class="quick-stat-value" id="qs-domain">—</span>
      </div>
      <div class="quick-stat-row">
        <span class="quick-stat-label">平均重要度</span>
        <span class="quick-stat-value" id="qs-imp">—</span>
      </div>
      <div class="quick-stat-row">
        <span class="quick-stat-label">平均情感效价</span>
        <span class="quick-stat-value" id="qs-valence">—</span>
      </div>
      <div class="quick-stat-row">
        <span class="quick-stat-label">未解决</span>
        <span class="quick-stat-value" id="qs-unresolved">—</span>
      </div>
    </div>
  </aside>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-label">内容</div>
        <div class="modal-content-text" id="modal-content"></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-label">重要度</div>
        <div class="imp-bar-wrap">
          <div class="imp-bar-track"><div class="imp-bar-fill" id="modal-imp-bar"></div></div>
          <div class="imp-bar-num" id="modal-imp-num"></div>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-label">元数据</div>
        <div class="modal-meta-grid" id="modal-meta"></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-label">标签</div>
        <div class="modal-tags-list" id="modal-tags"></div>
      </div>

      <!-- Edit -->
      <div class="edit-section">
        <div class="modal-section-label">编辑</div>
        <div class="edit-field">
          <label class="edit-label">标题</label>
          <input class="edit-input" id="edit-name" type="text">
        </div>
        <div class="edit-field">
          <label class="edit-label">内容</label>
          <textarea class="edit-textarea" id="edit-content"></textarea>
        </div>
        <div class="edit-field">
          <label class="edit-label">标签（逗号分隔）</label>
          <input class="edit-input" id="edit-tags" type="text">
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-delete">删除</button>
      <button class="btn btn-secondary" id="btn-cancel">取消</button>
      <button class="btn btn-primary" id="btn-save">保存修改</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── State ───
let allBuckets = [];
let currentFilter = 'all';
let searchQuery = '';
let calYear, calMonth;
let currentBucket = null;

// ─── API ───
const API = window.location.origin;

async function fetchBuckets() {
  try {
    const res = await fetch(`${API}/api/buckets`);
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    // data could be an array or { buckets: [...] }
    return Array.isArray(data) ? data : (data.buckets || []);
  } catch (e) {
    console.error('Failed to fetch buckets:', e);
    return [];
  }
}

async function fetchBucket(id) {
  try {
    const res = await fetch(`${API}/api/bucket/${id}`);
    if (!res.ok) throw new Error(res.statusText);
    return await res.json();
  } catch (e) {
    console.error('Failed to fetch bucket:', e);
    return null;
  }
}

async function updateBucket(id, updates) {
  try {
    const res = await fetch(`${API}/api/bucket/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    return res.ok;
  } catch (e) {
    console.error('Failed to update bucket:', e);
    return false;
  }
}

async function deleteBucket(id) {
  try {
    const res = await fetch(`${API}/api/bucket/${id}`, {
      method: 'DELETE'
    });
    return res.ok;
  } catch (e) {
    console.error('Failed to delete bucket:', e);
    return false;
  }
}

// ─── Helpers ───
function parseDate(str) {
  if (!str) return null;
  return new Date(str);
}

function formatDate(d) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.floor((today - target) / 86400000);

  if (diff === 0) return '今天';
  if (diff === 1) return '昨天';
  if (diff === 2) return '前天';
  if (diff < 7) return `${diff} 天前`;

  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y === now.getFullYear() ? `${m}月${day}日` : `${y}年${m}月${day}日`;
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isToday(d) {
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
}

function isRecent7(d) {
  const now = new Date();
  return (now - d) < 7 * 86400000;
}

function getBucketDate(b) {
  return parseDate(b.created_at || b.created || b.date) || new Date();
}

function getBucketId(b) {
  return b.bucket_id || b.id || b.name;
}

function getBucketContent(b) {
  return b.content || b.text || b.summary || '';
}

function getBucketTags(b) {
  const t = b.tags || [];
  return Array.isArray(t) ? t : t.split(',').map(s => s.trim()).filter(Boolean);
}

function getBucketDomains(b) {
  const d = b.domain || b.domains || [];
  return Array.isArray(d) ? d : [d];
}

function isPinned(b) { return b.pinned === true || b.pinned === 1; }
function isFeel(b) { return b.feel === true || b.feel === 1 || (b.type === 'feel'); }
function isResolved(b) { return b.resolved === true || b.resolved === 1; }
function getImportance(b) { return b.importance || b.imp || 5; }

// ─── Filter ───
function filterBuckets(buckets) {
  let result = buckets;

  switch (currentFilter) {
    case 'pinned':
      result = result.filter(isPinned);
      break;
    case 'feel':
      result = result.filter(isFeel);
      break;
    case 'recent':
      result = result.filter(b => isRecent7(getBucketDate(b)));
      break;
    case 'important':
      result = result.filter(b => getImportance(b) >= 7);
      break;
    case 'resolved':
      result = result.filter(isResolved);
      break;
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    result = result.filter(b => {
      const name = (b.name || '').toLowerCase();
      const content = getBucketContent(b).toLowerCase();
      const tags = getBucketTags(b).join(' ').toLowerCase();
      return name.includes(q) || content.includes(q) || tags.includes(q);
    });
  }

  return result;
}

// ─── Render Feed ───
function renderFeed(buckets) {
  const feed = document.getElementById('memory-feed');
  const filtered = filterBuckets(buckets);

  if (filtered.length === 0) {
    feed.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🫧</div>
        <div class="empty-text">${searchQuery ? '没有找到匹配的记忆' : '这里还没有记忆'}</div>
      </div>`;
    return;
  }

  // Group by date
  const groups = {};
  filtered.forEach(b => {
    const d = getBucketDate(b);
    const key = dateKey(d);
    if (!groups[key]) groups[key] = { date: d, buckets: [] };
    groups[key].buckets.push(b);
  });

  // Sort groups by date desc
  const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  let html = '';
  sortedKeys.forEach(key => {
    const g = groups[key];
    const todayClass = isToday(g.date) ? 'today' : '';

    html += `<div class="date-group ${todayClass}" data-date="${key}">`;
    html += `<div class="date-header" onclick="toggleGroup(this)">`;
    html += `<div class="date-dot"></div>`;
    html += `<div class="date-label">${formatDate(g.date)}</div>`;
    html += `<div class="date-count">${g.buckets.length} 条</div>`;
    html += `<div class="date-chevron">▾</div>`;
    html += `</div>`;
    html += `<div class="memory-list">`;

    // Sort buckets within group by importance desc
    g.buckets.sort((a, b) => getImportance(b) - getImportance(a));

    g.buckets.forEach(b => {
      const id = getBucketId(b);
      const name = b.name || '未命名记忆';
      const content = getBucketContent(b);
      const domains = getBucketDomains(b);
      const tags = getBucketTags(b);
      const imp = getImportance(b);
      const pinned = isPinned(b);
      const feel = isFeel(b);

      let cardClass = 'memory-card';
      if (pinned) cardClass += ' pinned';
      else if (feel) cardClass += ' feel';
      else if (imp >= 8) cardClass += ' high-imp';

      let badges = '';
      if (pinned) badges += '<span class="badge pinned-badge">钉选</span>';
      if (feel) badges += '<span class="badge feel-badge">feel</span>';
      if (imp >= 8) badges += `<span class="badge imp-badge">imp:${imp}</span>`;

      let domainHtml = domains.filter(Boolean).map(d => `<span class="card-domain">${d}</span>`).join('');
      let tagHtml = tags.slice(0, 4).map(t => `<span class="card-tag">#${t}</span>`).join('');
      if (tags.length > 4) tagHtml += `<span class="card-tag">+${tags.length - 4}</span>`;

      html += `<div class="${cardClass}" onclick="openDetail('${id}')">`;
      html += `<div class="card-top"><div class="card-name">${esc(name)}</div><div class="card-badges">${badges}</div></div>`;
      if (content) html += `<div class="card-content">${esc(content)}</div>`;
      html += `<div class="card-meta">${domainHtml}${tagHtml}<span class="card-imp">imp:${imp}</span></div>`;
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  feed.innerHTML = html;
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function toggleGroup(header) {
  header.parentElement.classList.toggle('collapsed');
}

// ─── Detail Modal ───
async function openDetail(id) {
  const bucket = allBuckets.find(b => getBucketId(b) === id);
  if (!bucket) return;
  currentBucket = bucket;

  const overlay = document.getElementById('modal-overlay');
  const name = bucket.name || '未命名';
  const content = getBucketContent(bucket);
  const tags = getBucketTags(bucket);
  const domains = getBucketDomains(bucket);
  const imp = getImportance(bucket);
  const d = getBucketDate(bucket);

  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-content').textContent = content;
  document.getElementById('modal-imp-bar').style.width = `${imp * 10}%`;
  document.getElementById('modal-imp-num').textContent = imp;

  const metaHtml = `
    <div class="meta-item"><div class="meta-label">创建时间</div><div class="meta-value">${d.toLocaleString('zh-CN')}</div></div>
    <div class="meta-item"><div class="meta-label">领域</div><div class="meta-value">${domains.filter(Boolean).join(', ') || '—'}</div></div>
    <div class="meta-item"><div class="meta-label">效价 Valence</div><div class="meta-value">${bucket.valence != null ? bucket.valence : '—'}</div></div>
    <div class="meta-item"><div class="meta-label">唤醒度 Arousal</div><div class="meta-value">${bucket.arousal != null ? bucket.arousal : '—'}</div></div>
    <div class="meta-item"><div class="meta-label">状态</div><div class="meta-value">${isPinned(bucket) ? '📌 钉选' : isResolved(bucket) ? '💤 已沉底' : '🟢 活跃'}</div></div>
    <div class="meta-item"><div class="meta-label">类型</div><div class="meta-value">${isFeel(bucket) ? '💜 Feel' : (bucket.type || 'dynamic')}</div></div>
  `;
  document.getElementById('modal-meta').innerHTML = metaHtml;

  document.getElementById('modal-tags').innerHTML = tags.map(t => `<span class="modal-tag">#${esc(t)}</span>`).join('');

  // Fill edit fields
  document.getElementById('edit-name').value = name;
  document.getElementById('edit-content').value = content;
  document.getElementById('edit-tags').value = tags.join(', ');

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentBucket = null;
}

document.getElementById('modal-close').onclick = closeModal;
document.getElementById('btn-cancel').onclick = closeModal;
document.getElementById('modal-overlay').onclick = (e) => {
  if (e.target === e.currentTarget) closeModal();
};

document.getElementById('btn-save').onclick = async () => {
  if (!currentBucket) return;
  const id = getBucketId(currentBucket);
  const newName = document.getElementById('edit-name').value.trim();
  const newContent = document.getElementById('edit-content').value.trim();
  const newTags = document.getElementById('edit-tags').value.split(/[,，]/).map(s => s.trim()).filter(Boolean);

  const ok = await updateBucket(id, { name: newName, content: newContent, tags: newTags });
  if (ok) {
    showToast('已保存 ✓');
    closeModal();
    await reload();
  } else {
    showToast('保存失败，后端可能不支持此操作');
  }
};

document.getElementById('btn-delete').onclick = async () => {
  if (!currentBucket) return;
  if (!confirm('确定要删除这条记忆吗？此操作不可恢复。')) return;
  const id = getBucketId(currentBucket);
  const ok = await deleteBucket(id);
  if (ok) {
    showToast('已删除');
    closeModal();
    await reload();
  } else {
    showToast('删除失败');
  }
};

// ─── Calendar ───
function renderCalendar(year, month) {
  const grid = document.getElementById('cal-grid');
  const label = document.getElementById('cal-month');

  label.textContent = `${year}年${month + 1}月`;

  // Count memories per day
  const dayCounts = {};
  allBuckets.forEach(b => {
    const d = getBucketDate(b);
    if (d.getFullYear() === year && d.getMonth() === month) {
      const day = d.getDate();
      dayCounts[day] = (dayCounts[day] || 0) + 1;
    }
  });

  const maxCount = Math.max(...Object.values(dayCounts), 1);
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  let html = '';
  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="calendar-day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const count = dayCounts[d] || 0;
    let level = 0;
    if (count > 0) {
      const ratio = count / maxCount;
      if (ratio <= 0.2) level = 1;
      else if (ratio <= 0.4) level = 2;
      else if (ratio <= 0.6) level = 3;
      else if (ratio <= 0.8) level = 4;
      else level = 5;
    }

    const isT = year === today.getFullYear() && month === today.getMonth() && d === today.getDate();
    const hasMem = count > 0;

    html += `<div class="calendar-day level-${level}${isT ? ' today' : ''}${hasMem ? ' has-memories' : ''}"
      title="${count ? count + ' 条记忆' : ''}"
      ${hasMem ? `onclick="filterByDate(${year},${month},${d})"` : ''}>${d}</div>`;
  }

  grid.innerHTML = html;
}

document.getElementById('cal-prev').onclick = () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar(calYear, calMonth);
};

document.getElementById('cal-next').onclick = () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar(calYear, calMonth);
};

function filterByDate(y, m, d) {
  const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const group = document.querySelector(`.date-group[data-date="${key}"]`);
  if (group) {
    group.classList.remove('collapsed');
    group.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ─── Quick Stats ───
function updateStats(buckets) {
  document.getElementById('stat-total').textContent = buckets.length;
  document.getElementById('stat-feel').textContent = buckets.filter(isFeel).length;
  document.getElementById('stat-pinned').textContent = buckets.filter(isPinned).length;

  // Domain frequency
  const domainCount = {};
  buckets.forEach(b => {
    getBucketDomains(b).filter(Boolean).forEach(d => {
      domainCount[d] = (domainCount[d] || 0) + 1;
    });
  });
  const topDomain = Object.entries(domainCount).sort((a, b) => b[1] - a[1])[0];
  document.getElementById('qs-domain').textContent = topDomain ? topDomain[0] : '—';

  // Avg importance
  const imps = buckets.map(getImportance);
  const avgImp = imps.length ? (imps.reduce((a, b) => a + b, 0) / imps.length).toFixed(1) : '—';
  document.getElementById('qs-imp').textContent = avgImp;

  // Avg valence
  const vals = buckets.filter(b => b.valence != null).map(b => parseFloat(b.valence));
  const avgVal = vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2) : '—';
  document.getElementById('qs-valence').textContent = avgVal;

  // Unresolved
  document.getElementById('qs-unresolved').textContent = buckets.filter(b => !isResolved(b) && !isPinned(b)).length;
}

// ─── Tabs ───
document.getElementById('tabs').onclick = (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.filter;
  renderFeed(allBuckets);
};

// ─── Search ───
let searchTimer;
document.getElementById('search-input').oninput = (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    renderFeed(allBuckets);
  }, 300);
};

// ─── Toast ───
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

// ─── Init ───
async function reload() {
  allBuckets = await fetchBuckets();
  allBuckets.sort((a, b) => getBucketDate(b) - getBucketDate(a));
  renderFeed(allBuckets);
  renderCalendar(calYear, calMonth);
  updateStats(allBuckets);
}

async function init() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();

  allBuckets = await fetchBuckets();
  allBuckets.sort((a, b) => getBucketDate(b) - getBucketDate(a));

  document.getElementById('loading').style.display = 'none';
  renderFeed(allBuckets);
  renderCalendar(calYear, calMonth);
  updateStats(allBuckets);
}

init();
</script>
</body>
</html>
