services:
  - type: web
    name: ombre-brain
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: OMBRE_TRANSPORT
        value: streamable-http
      - key: OMBRE_API_KEY
        sync: false          # Set in Render dashboard > Environment (any OpenAI-compatible key)
      - key: OMBRE_DEHYDRATION_MODEL
        value: gemini-2.5-flash-lite
      - key: OMBRE_DEHYDRATION_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: OMBRE_EMBEDDING_MODEL
        value: text-embedding-004
      - key: OMBRE_BUCKETS_DIR
        value: /opt/render/project/src/buckets
    disk:
      name: ombre-buckets
      mountPath: /opt/render/project/src/buckets
      sizeGB: 1
